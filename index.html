<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber OS v5.0 // Core Dashboard</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0a0a0c;
            --border-color: #1a1a24;
            --accent: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.2);
            --text-main: #00ff66;
            --text-dim: #555566;
            --danger: #ff3333;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-mono);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        header {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .status-bar {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 15px 20px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-main);
            background: rgba(0, 255, 102, 0.03);
            border-left-color: var(--accent);
        }

        content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
        }

        .panel-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            width: 100%;
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--accent-glow);
        }

        button.cyber-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        button.cyber-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .driver-item, .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
        }

        .tag.active {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">// CYBER_OS_V5.0 // CORE</div>
        <div class="status-bar" id="sys-status">STATUS: SECURE [OFFLINE]</div>
    </header>

    <div class="main-container">
        <aside>
            <button class="nav-btn active" onclick="switchTab('admin', this)">> Admin Core</button>
            <button class="nav-btn" onclick="switchTab('ai', this)">> AI Key Pool</button>
            <button class="nav-btn" onclick="switchTab('drivers', this)">> Drivers & Scripts</button>
            <button class="nav-btn" onclick="switchTab('storage', this)">> JSON Storage</button>
        </aside>

        <content>
            <!-- ADMIN CORE -->
            <div id="admin" class="tab-content active">
                <h2>Admin Control & Identity</h2>
                <div class="panel-card">
                    <label>System Account / Handle:</label>
                    <input type="text" id="account-name" value="RootOperator">
                    <label>Security Clearance Level:</label>
                    <select id="clearance-level">
                        <option value="MAX">Level 5 (Full Autonomous)</option>
                        <option value="MID">Level 3 (Restricted)</option>
                    </select>
                    <button class="cyber-btn" onclick="saveAccountSettings()">Save Identity</button>
                </div>
            </div>

            <!-- AI KEY POOL -->
            <div id="ai" class="tab-content">
                <h2>AI Models & API Gateways</h2>
                <div class="panel-card">
                    <label>Provider:</label>
                    <select id="ai-provider">
                        <option value="OpenAI">OpenAI (GPT-4o / Custom)</option>
                        <option value="Anthropic">Anthropic (Claude 3.5)</option>
                        <option value="Google">Google Gemini API</option>
                        <option value="CustomLocal">Local Endpoint (Ollama / LM Studio)</option>
                    </select>
                    <label>API Key / Endpoint URL:</label>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="cyber-btn" onclick="addApiKey()">Register Key</button>
                </div>
                <div class="panel-card">
                    <h3>Active Gateways</h3>
                    <div id="keys-list"></div>
                </div>
            </div>

            <!-- DRIVERS & SCRIPTS -->
            <div id="drivers" class="tab-content">
                <h2>Virtual Drivers & JS Modules</h2>
                <div class="panel-card">
                    <label>Driver / Module Name:</label>
                    <input type="text" id="driver-name" placeholder="e.g. MemoryScraper.js">
                    <label>Execution Mode:</label>
                    <select id="driver-mode">
                        <option value="background">Background Daemon</option>
                        <option value="manual">Manual Trigger</option>
                    </select>
                    <button class="cyber-btn" onclick="registerDriver()">Deploy Driver</button>
                </div>
                <div class="panel-card">
                    <h3>Loaded System Drivers</h3>
                    <div id="drivers-list"></div>
                </div>
            </div>

            <!-- JSON STORAGE -->
            <div id="storage" class="tab-content">
                <h2>Local .JSON Database Engine</h2>
                <div class="panel-card">
                    <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 10px;">
                        All core states are serialized and dumped into local storage structure.
                    </p>
                    <button class="cyber-btn" onclick="exportDataJson()">Export System State (.json)</button>
                    <textarea id="json-dump" rows="8" style="margin-top: 15px;" readonly></textarea>
                </div>
            </div>
        </content>
    </div>

    <script>
        // Инициализация локального хранилища состояния ОС
        let cyberState = JSON.parse(localStorage.getItem('CYBER_OS_STATE')) || {
            account: { name: "RootOperator", level: "MAX" },
            aiKeys: [],
            drivers: [
                { name: "CoreMemoryMonitor.js", mode: "background", status: "active" },
                { name: "LocalClipboardHook.js", mode: "manual", status: "active" }
            ]
        };

        function saveState() {
            localStorage.setItem('CYBER_OS_STATE', JSON.stringify(cyberState, null, 2));
            updateJsonDump();
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'storage') updateJsonDump();
        }

        function saveAccountSettings() {
            cyberState.account.name = document.getElementById('account-name').value;
            cyberState.account.level = document.getElementById('clearance-level').value;
            saveState();
            alert("Identity profile updated successfully.");
        }

        function addApiKey() {
            const provider = document.getElementById('ai-provider').value;
            const key = document.getElementById('api-key-input').value;
            if(!key) return;
            cyberState.aiKeys.push({ provider, key: key.slice(0, 6) + '...' });
            document.getElementById('api-key-input').value = '';
            saveState();
            renderKeys();
        }

        function renderKeys() {
            const container = document.getElementById('keys-list');
            container.innerHTML = cyberState.aiKeys.map((item, idx) => `
                <div class="key-item">
                    <span>${item.provider} (${item.key})</span>
                    <span class="tag active">CONNECTED</span>
                </div>
            `).join('') || '<span style="color:var(--text-dim)">No keys registered.</span>';
        }

        function registerDriver() {
            const name = document.getElementById('driver-name').value;
            const mode = document.getElementById('driver-mode').value;
            if(!name) return;
            cyberState.drivers.push({ name, mode, status: "active" });
            document.getElementById('driver-name').value = '';
            saveState();
            renderDrivers();
        }

        function renderDrivers() {
            const container = document.getElementById('drivers-list');
            container.innerHTML = cyberState.drivers.map(d => `
                <div class="driver-item">
                    <span>${d.name} [${d.mode}]</span>
                    <span class="tag ${d.status === 'active' ? 'active' : ''}">${d.status.toUpperCase()}</span>
                </div>
            `).join('');
        }

        function updateJsonDump() {
            document.getElementById('json-dump').value = JSON.stringify(cyberState, null, 2);
        }

        function exportDataJson() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cyberState, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "cyber_os_state.json");
            dlAnchorElem.click();
        }

        // Первичный рендер при старте
        document.getElementById('account-name').value = cyberState.account.name;
        document.getElementById('clearance-level').value = cyberState.account.level;
        renderKeys();
        renderDrivers();
        updateJsonDump();
    </script>
</body>
</html>

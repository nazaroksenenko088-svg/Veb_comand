<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER OS || BRUTAL V4.5</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <div class="crt-overlay"></div>

    <button class="floating-btn brutal-box-sm" onclick="AdminCore.toggle()">[SYS_CORE]</button>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="admin-panel brutal-box">
        <div class="admin-header">
            <span>// ADMIN_CORE_V4.5</span>
            <button onclick="AdminCore.toggle()" class="btn brutal-box-sm">X</button>
        </div>
        <div class="admin-body">
            <div class="admin-section">
                <div class="admin-title" data-i18n="sys_metrics">SYSTEM METRICS</div>
                <div class="metric-line"><span>UPTIME:</span> <span id="sys-uptime">00:00:00</span></div>
                <div class="metric-line"><span>CPU LOAD:</span> <span id="sys-cpu">12%</span></div>
                <div class="metric-line"><span>RAM USAGE:</span> <span id="sys-ram">342MB / 1024MB</span></div>
            </div>
            <div class="admin-section">
                <div class="admin-title" data-i18n="quick_actions">QUICK ACTIONS</div>
                <button class="btn btn-green brutal-box-sm style-full" onclick="AdminCore.exportConfig()" data-i18n="export_cfg">EXPORT CONFIG</button>
                <button class="btn brutal-box-sm style-full" style="color:#ef4444; border-color:#ef4444;" onclick="AdminCore.hardReset()" data-i18n="hard_reset">HARD RESET</button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header brutal-box">
        <div class="header-brand">
            <div class="status-indicator"></div>
            <div>
                <h1 style="margin:0; font-size: 1.1rem; text-transform: uppercase;">Cyber Command OS</h1>
                <div id="sys-clock" style="font-size:0.65rem; color:var(--text-muted); font-weight: bold;">00:00:00</div>
            </div>
        </div>
        <div class="header-controls">
            <select id="lang-select" class="brutal-input" onchange="App.setLanguage(this.value)">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
            <select id="theme-select" class="brutal-input" onchange="App.changeTheme()">
                <option value="cyberpunk">VOID_DARK</option>
                <option value="matrix">TOXIC_GREEN</option>
                <option value="dracula">BLOOD_PURPLE</option>
            </select>
        </div>
    </header>

    <!-- NAV TABS -->
    <nav class="nav-tabs">
        <button class="tab-btn active brutal-box-sm" onclick="App.openTab('terminal-tab', event)" data-i18n="tab_shell">[SHELL]</button>
        <button class="tab-btn brutal-box-sm" onclick="App.openTab('vscode-tab', event)">[VS_CODE]</button>
        <button class="tab-btn brutal-box-sm" onclick="App.openTab('plugins-tab', event)" data-i18n="tab_plugins">[PLUGINS]</button>
        <button class="tab-btn brutal-box-sm" onclick="App.openTab('chef-tab', event)">[CYBER_CHEF]</button>
        <button class="tab-btn brutal-box-sm" onclick="App.openTab('vault-tab', event)">[VAULT]</button>
    </nav>

    <!-- TAB 1: SHELL -->
    <main id="terminal-tab" class="tab-content active">
        <div class="terminal-container brutal-box">
            <div class="terminal-header">
                <span style="font-weight: 800; color: var(--accent);">>_ ROOT_TERMINAL</span>
                <select id="os-preset-select" onchange="App.changeOSPreset()" class="brutal-input" style="padding: 2px 5px; height: auto;">
                    <option value="termux">Termux / Android</option>
                    <option value="windows">Win11 CMD</option>
                    <option value="debian">Debian Linux</option>
                </select>
            </div>
            <div class="terminal-output" id="term-out">SYSTEM_INITIALIZED... READY.&#10;</div>
            <div class="terminal-input-line">
                <span id="term-prompt">~$</span>
                <input type="text" id="term-input" class="brutal-input" style="flex:1;" onkeydown="App.handleTermInput(event)" autofocus>
            </div>
        </div>
    </main>

    <!-- TAB 2: VS CODE -->
    <main id="vscode-tab" class="tab-content">
        <div class="brutal-box" style="padding: 0; height: 78vh; overflow: hidden; background: #000;">
            <iframe src="https://stackblitz.com/edit/web-platform?embed=1&file=index.html&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </main>

    <!-- TAB 3: DYNAMIC PLUGINS (NEW) -->
    <main id="plugins-tab" class="tab-content">
        <div class="brutal-box">
            <h3 style="margin-top: 0; color: var(--accent);" data-i18n="plugins_title">// EXTERNAL_MODULES_INJECTOR</h3>
            
            <div class="brutal-input" style="padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5);">
                <p style="margin-top:0; font-size:0.8rem; color:var(--text-muted);">Введи прямой URL на внешний JS-файл для инжекта в систему.</p>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="plugin-url" class="brutal-input" placeholder="https://cdn.jsdelivr.net/npm/..." style="flex:1;">
                    <button class="btn btn-main brutal-box-sm" onclick="App.injectExternalPlugin()">INJECT</button>
                </div>
            </div>

            <div id="active-plugins" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                <!-- Сюда будут падать установленные плагины -->
            </div>
        </div>
    </main>

    <!-- TAB 4: CYBERCHEF -->
    <main id="chef-tab" class="tab-content">
        <div class="brutal-box" style="padding: 0; height: 78vh; overflow: hidden; background: #000;">
            <iframe src="https://gchq.github.io/CyberChef/" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </main>

    <!-- TAB 5: VAULT -->
    <main id="vault-tab" class="tab-content">
        <div class="brutal-box">
            <h3 style="margin-top: 0; color: var(--accent-green);">// SCRIPT_VAULT</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                <input type="text" id="script-name" class="brutal-input" placeholder="Alias" value="SIGMA_PROJECT" style="flex:1; min-width: 120px;">
                <input type="text" id="script-path" class="brutal-input" placeholder="Path" value="C:\Users\oksen\OneDrive\CYBER_TOOLS\SIGMA_PROJECT" style="flex:2; min-width: 250px;">
                <button class="btn btn-green brutal-box-sm" onclick="App.addScript()">ADD</button>
            </div>
            <div id="vault-grid" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </main>

    <script src="admin-panel.js"></script>
    <script src="app.js"></script>
</body>
</html>
